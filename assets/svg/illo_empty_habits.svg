<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Fond circulaire doux -->
  <circle cx="100" cy="100" r="80" fill="#EDE9E2"/>

  <!-- Cible extérieure -->
  <circle cx="100" cy="100" r="56" stroke="#A89880" stroke-width="2"/>
  <!-- Cible intermédiaire -->
  <circle cx="100" cy="100" r="36" stroke="#A89880" stroke-width="2"/>
  <!-- Cible intérieure -->
  <circle cx="100" cy="100" r="18" stroke="#8B6F47" stroke-width="2"/>

  <!-- Croix centrale "+" -->
  <line x1="100" y1="88" x2="100" y2="112" stroke="#8B6F47" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="100" x2="112" y2="100" stroke="#8B6F47" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Petites étoiles décoratives -->
  <circle cx="52" cy="68" r="3" fill="#A89880" opacity="0.6"/>
  <circle cx="148" cy="72" r="2" fill="#A89880" opacity="0.5"/>
  <circle cx="60" cy="136" r="2.5" fill="#A89880" opacity="0.4"/>
  <circle cx="145" cy="140" r="3" fill="#A89880" opacity="0.6"/>
</svg>
