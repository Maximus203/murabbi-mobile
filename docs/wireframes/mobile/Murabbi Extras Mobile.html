<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Murabbi · Extras Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Noto+Sans+Arabic:wght@400;500;600&display=swap"/>
<style>
  html, body { margin:0; padding:0; background:#f0eee9; font-family:'Geist', system-ui, -apple-system, sans-serif; color:#1C1A16; }
  *, *::before, *::after { box-sizing: border-box; }
  body { -webkit-font-smoothing: antialiased; }
  /* hide canvas placeholder before React paints */
  #root:empty::before { content:''; display:block; height:100vh; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="extras-tokens.jsx"></script>
  <script type="text/babel" src="extras-frames.jsx"></script>
  <script type="text/babel" src="extras-notifications.jsx"></script>
  <script type="text/babel" src="extras-widgets.jsx"></script>
  <script type="text/babel" src="extras-lockscreen-live.jsx"></script>
  <script type="text/babel" src="extras-inapp-icons.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "wallpaperMode": "light",
      "platform": "Android",
      "androidSkin": "Pixel"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const wp = tweaks.wallpaperMode === 'dark' ? 'dusk' : 'morning';
      const wpClock = tweaks.wallpaperMode === 'dark' ? '#fff' : '#1C1A16';

      // ── Helpers to wrap a screen in the right device frame ───────────────
      const Frame = ({ children, dark = true, w = 360 }) => {
        if (tweaks.platform === 'Android') {
          return <PixelFrame width={w} dark={dark}>{children}</PixelFrame>;
        }
        return <IPhoneFrame width={w} dark={dark}>{children}</IPhoneFrame>;
      };

      const ABW = 380;     // realistic frame artboard width
      const ABH = 800;
      const SIMPLE_W = 360;
      const SIMPLE_H = 720;

      return (
        <>
          <DesignCanvas
            title="Murabbi · Extras Mobile"
            subtitle="Notifications, widgets, Live Activities, écrans clés in-app, App Icons"
          >

            {/* ───────────── 1. INTRO / SYSTÈME ───────────── */}
            <DCSection id="systeme" title="Système & inventaire" subtitle="Palette terreuse · Geist · Noto Sans Arabic. 33 mockups répartis en 6 sections.">
              <DCArtboard id="map" label="Carte du livrable" width={760} height={480}>
                <Inventory/>
              </DCArtboard>
              <DCArtboard id="palette" label="Tokens · couleurs & statuts" width={420} height={420}>
                <PaletteSheet/>
              </DCArtboard>
            </DCSection>

            {/* ───────────── 2. APP ICONS ───────────── */}
            <DCSection id="appicons" title="App Icons" subtitle="4 variations — sur fond neutre puis intégrées dans une grille iOS.">
              <DCArtboard id="icons-sheet" label="A · Variations" width={520} height={300}>
                <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'space-around', padding: 24, background: '#FDFBF8' }}>
                  <AppIconShowcase size={88} variant="light" label="Light" sub="A1 · défaut"/>
                  <AppIconShowcase size={88} variant="dark" label="Dark" sub="A2 · sombre"/>
                  <AppIconShowcase size={88} variant="tinted" label="Tinted" sub="A3 · iOS 18"/>
                  <AppIconShowcase size={88} variant="sage" label="Sage" sub="A4 · alternatif"/>
                </div>
              </DCArtboard>
              <DCArtboard id="icons-onhome" label="B · Sur grille iOS" width={SIMPLE_W} height={480}>
                <AppIconOnHome width={SIMPLE_W} tone={wp}/>
              </DCArtboard>
            </DCSection>

            {/* ───────────── 3. WIDGETS iOS ───────────── */}
            <DCSection id="widgets-ios" title="Widgets — iOS" subtitle="9 mockups : 3 small (2×2), 3 medium (4×2), 2 large (4×4) + écran d'ajout.">
              <DCArtboard id="w-b1" label="B1 · Score 2×2" width={200} height={200}><WidgetCenter><WidgetB1/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b2" label="B2 · Prochaine prière 2×2" width={200} height={200}><WidgetCenter><WidgetB2/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b3" label="B3 · Streak 2×2" width={200} height={200}><WidgetCenter><WidgetB3/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b4" label="B4 · Vue d'ensemble 4×2" width={380} height={200}><WidgetCenter><WidgetB4/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b5" label="B5 · À venir 4×2" width={380} height={200}><WidgetCenter><WidgetB5/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b6" label="B6 · Salat 4×2" width={380} height={200}><WidgetCenter><WidgetB6/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b7" label="B7 · Tableau de bord 4×4" width={380} height={400}><WidgetCenter><WidgetB7/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b8" label="B8 · Calendrier mois 4×4" width={380} height={400}><WidgetCenter><WidgetB8/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-b9" label="B9 · Écran d'ajout iOS" width={400} height={580}><WidgetCenter><WidgetB9/></WidgetCenter></DCArtboard>
            </DCSection>

            {/* ───────────── 4. WIDGETS iOS — ÉCRAN D'ACCUEIL ───────────── */}
            <DCSection id="ios-home" title="Widgets iOS — sur écran d'accueil" subtitle="Mises en situation réalistes (iPhone 14 Pro · Dynamic Island).">
              <DCArtboard id="ios-home-1" label="C1 · Small + medium" width={ABW} height={ABH}>
                <Frame dark={tweaks.wallpaperMode === 'dark'}>
                  <IOSHomeContext width={SIMPLE_W} tone={wp}>
                    <div style={{ display:'flex', gap: 14 }}>
                      <WidgetB1/>
                      <WidgetB2/>
                    </div>
                    <WidgetB4/>
                  </IOSHomeContext>
                </Frame>
              </DCArtboard>
              <DCArtboard id="ios-home-2" label="C2 · Large dashboard" width={ABW} height={ABH}>
                <Frame dark={tweaks.wallpaperMode === 'dark'}>
                  <IOSHomeContext width={SIMPLE_W} tone={wp}>
                    <WidgetB7/>
                  </IOSHomeContext>
                </Frame>
              </DCArtboard>
            </DCSection>

            {/* ───────────── 5. WIDGETS — ANDROID (PIXEL) ───────────── */}
            <DCSection id="widgets-android" title="Widgets — Android (Pixel stock)" subtitle="Material 3, palette Murabbi reportée. 4 mockups simplifiés + 1 écran d'accueil.">
              <DCArtboard id="w-c1" label="C1 · Score 2×2" width={200} height={200}><WidgetCenter><WidgetC1/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-c2" label="C2 · Vue d'ensemble 4×2" width={380} height={200}><WidgetCenter><WidgetC2/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-c3" label="C3 · Tableau de bord 4×4" width={380} height={400}><WidgetCenter><WidgetC3/></WidgetCenter></DCArtboard>
              <DCArtboard id="w-c4" label="C4 · Picker Pixel" width={400} height={580}><WidgetCenter><WidgetC4/></WidgetCenter></DCArtboard>
              <DCArtboard id="pixel-home" label="C5 · Sur écran Pixel" width={ABW} height={ABH}>
                <PixelFrame width={SIMPLE_W} dark>
                  <PixelHomeContext width={SIMPLE_W}>
                    <WidgetC2/>
                    <WidgetC3/>
                  </PixelHomeContext>
                </PixelFrame>
              </DCArtboard>
            </DCSection>

            {/* ───────────── 6. LOCK SCREEN WIDGETS (iOS 16+) ───────────── */}
            <DCSection id="lockscreen" title="Lock screen widgets (iOS)" subtitle="Slot inline, slots circulaires (×2), slot rectangulaire — au-dessus et au-dessous de l'horloge.">
              <DCArtboard id="ls-config-default" label="D1 · Configuration par défaut" width={ABW} height={ABH}>
                <IPhoneFrame width={SIMPLE_W} dark>
                  <LockWidgetsContextIOS width={SIMPLE_W} tone="dusk"/>
                </IPhoneFrame>
              </DCArtboard>
              <DCArtboard id="ls-config-alt" label="D2 · Inline « Asr » + 3 widgets" width={ABW} height={ABH}>
                <IPhoneFrame width={SIMPLE_W} dark>
                  <LockWidgetsContextIOS width={SIMPLE_W} tone="dusk">
                    {{ inline: <LSInline><Icon name="flame" size={11} color="#fff"/><span>14 jours · 42 pts</span></LSInline>,
                       row: <><LSCircNext/><LSRectScore/><LSCircRing/></> }}
                  </LockWidgetsContextIOS>
                </IPhoneFrame>
              </DCArtboard>
              <DCArtboard id="ls-pieces" label="D3 · Pièces détachées" width={420} height={300}>
                <div style={{ height:'100%', background:'#3D3024', padding: 24, display:'flex', flexDirection:'column', gap: 16, justifyContent:'center', borderRadius: 12 }}>
                  <div style={{ display:'flex', justifyContent:'center' }}><LSInline><Icon name="sun" size={11} color="#fff"/><span>Asr · 16:32</span></LSInline></div>
                  <div style={{ display:'flex', gap: 8, justifyContent:'center' }}>
                    <LSCircRing/>
                    <LSRectAsr/>
                    <LSCircStreak/>
                  </div>
                  <div style={{ display:'flex', gap: 8, justifyContent:'center' }}>
                    <LSCircNext/>
                    <LSRectScore/>
                    <LSCircStreak/>
                  </div>
                </div>
              </DCArtboard>
            </DCSection>

            {/* ───────────── 7. LIVE ACTIVITIES ───────────── */}
            <DCSection id="live" title="Live Activities (iOS)" subtitle="Plage à l'heure d'une prière — Dynamic Island compact / pair / expanded + carte sur lock screen.">
              <DCArtboard id="la-compact" label="E1 · Dynamic Island compact" width={360} height={200}>
                <div style={{ display:'flex', justifyContent:'center', alignItems:'flex-start', height:'100%', padding: '12px 0', background:'#F0EEE9' }}>
                  <DICrop>{<LADynamicIslandCompact/>}</DICrop>
                </div>
              </DCArtboard>
              <DCArtboard id="la-pair" label="E2 · Minimal pair (split)" width={360} height={200}>
                <div style={{ display:'flex', justifyContent:'center', alignItems:'flex-start', height:'100%', padding: '12px 0', background:'#F0EEE9' }}>
                  <DICrop>{<LADynamicIslandPair/>}</DICrop>
                </div>
              </DCArtboard>
              <DCArtboard id="la-expanded" label="E3 · Dynamic Island expanded" width={360} height={240}>
                <div style={{ display:'flex', justifyContent:'center', alignItems:'flex-start', height:'100%', padding: '12px 0', background:'#F0EEE9' }}>
                  <DICrop height={150}>{<LADynamicIslandExpanded/>}</DICrop>
                </div>
              </DCArtboard>
              <DCArtboard id="la-lock" label="E4 · Lock screen (vitrine)" width={ABW} height={ABH}>
                <IPhoneFrame width={SIMPLE_W} dark>
                  <LALockCard/>
                </IPhoneFrame>
              </DCArtboard>
            </DCSection>

            {/* ───────────── 8. NOTIFICATIONS ───────────── */}
            <DCSection id="notifs" title="Notifications" subtitle="15 mockups : rappels d'habitudes, prières, streaks, niveaux, contenu, récap, in-app, groupage, permission.">
              {[
                ['F1', 'Rappel d\'habitude · iOS lock', NotifA1, ABW, ABH, true],
                ['F2', 'Rappel d\'habitude · Pixel lock', NotifA2, ABW, ABH, false],
                ['F3', 'Salat · banner in-app iOS', NotifA3, ABW, ABH, true],
                ['F4', 'Salat · Android lock + actions', NotifA4, ABW, ABH, false],
                ['F5', 'Salat · long-press expanded', NotifA5, ABW, ABH, true],
                ['F6', 'Streak · 7 jours', NotifA6, ABW, ABH, true],
                ['F7', 'Streak · 30 jours', NotifA7, ABW, ABH, true],
                ['F8', 'Streak · 1 an (riche)', NotifA8, ABW, ABH, true],
                ['F9', 'Niveau · Murid débloqué', NotifA9, ABW, ABH, true],
                ['F10','Contenu · nouvelle collection iOS', NotifA10, ABW, ABH, true],
                ['F11','Contenu · nouvelle collection Pixel', NotifA11, ABW, ABH, false],
                ['F12','Récap hebdo · dimanche soir', NotifA12, ABW, ABH, true],
                ['F13','Toast in-app · validation', NotifA13, ABW, ABH, true],
                ['F14','Groupage · 3 rappels stackés', NotifA14, ABW, ABH, true],
                ['F15','Permission iOS · première ouverture', NotifA15, ABW, ABH, true],
              ].map(([id, label, Cmp, w, h, ios]) => (
                <DCArtboard key={id} id={`notif-${id}`} label={`${id} · ${label}`} width={w} height={h}>
                  {ios
                    ? <IPhoneFrame width={SIMPLE_W} dark><Cmp/></IPhoneFrame>
                    : <PixelFrame width={SIMPLE_W} dark><Cmp/></PixelFrame>}
                </DCArtboard>
              ))}
            </DCSection>

            {/* ───────────── 9. IN-APP MOMENTS ───────────── */}
            <DCSection id="inapp" title="Moments in-app" subtitle="Écrans de célébration et états vides — quatre moments charnières du parcours.">
              <DCArtboard id="ia-1" label="G1 · Streak 7 jours" width={ABW} height={ABH}>
                <IPhoneFrame width={SIMPLE_W}><InAppStreakDay7 width={SIMPLE_W}/></IPhoneFrame>
              </DCArtboard>
              <DCArtboard id="ia-2" label="G2 · Niveau 1 — Murid" width={ABW} height={ABH}>
                <IPhoneFrame width={SIMPLE_W} dark><InAppLevelUp width={SIMPLE_W}/></IPhoneFrame>
              </DCArtboard>
              <DCArtboard id="ia-3" label="G3 · État vide · habitudes" width={ABW} height={ABH}>
                <IPhoneFrame width={SIMPLE_W}><InAppEmptyState width={SIMPLE_W}/></IPhoneFrame>
              </DCArtboard>
              <DCArtboard id="ia-4" label="G4 · Journée complète" width={ABW} height={ABH}>
                <IPhoneFrame width={SIMPLE_W}><InAppDayDone width={SIMPLE_W}/></IPhoneFrame>
              </DCArtboard>
            </DCSection>

          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Wallpaper">
              <TweakRadio label="Mode" value={tweaks.wallpaperMode} onChange={v => setTweak('wallpaperMode', v)} options={[
                { value:'light', label:'Clair' },
                { value:'dark',  label:'Sombre' },
              ]}/>
            </TweakSection>
            <TweakSection title="Plateforme (mises en situation)">
              <TweakRadio label="Device" value={tweaks.platform} onChange={v => setTweak('platform', v)} options={[
                { value:'iOS',     label:'iOS' },
                { value:'Android', label:'Android' },
              ]}/>
              <TweakRadio label="Skin Android" value={tweaks.androidSkin} onChange={v => setTweak('androidSkin', v)} options={[
                { value:'Pixel',   label:'Pixel' },
                { value:'Samsung', label:'Samsung' },
              ]}/>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function WidgetCenter({ children }) {
      return (
        <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#F0EEE9' }}>
          {children}
        </div>
      );
    }

    // Crops the top of an iPhone frame to show only the Dynamic Island region
    function DICrop({ children, height = 110 }) {
      return (
        <div style={{ width: 320, height, overflow: 'hidden', borderRadius: 36, position:'relative' }}>
          <div style={{ position:'absolute', top: 0, left: 0 }}>{children}</div>
        </div>
      );
    }

    // ── Inventory artboard ─────────────────────────────────────────────────
    function Inventory() {
      const rows = [
        { id:'A', name:'App Icons',          n:'4 variations + grille',   list:'Light · Dark · Tinted · Sage' },
        { id:'B', name:'Widgets iOS',         n:'9 mockups',               list:'3 small · 3 medium · 2 large + Add' },
        { id:'C', name:'Widgets Android',     n:'4 mockups + Pixel home',  list:'Pixel stock · Material 3' },
        { id:'D', name:'Lock screen (iOS)',   n:'3 compositions',          list:'Inline + circulaires + rectangulaire' },
        { id:'E', name:'Live Activities',     n:'4 mockups',               list:'Compact · Pair · Expanded · Lock' },
        { id:'F', name:'Notifications',       n:'15 mockups',              list:'Rappels · Salat · Streaks · Niveau · Contenu · Récap · In-app · Groupage · Permission' },
        { id:'G', name:'Moments in-app',      n:'4 écrans',                list:'Streak · Niveau · Empty · Day done' },
      ];
      const total = 4 + 9 + 4 + 1 + 3 + 4 + 15 + 4;
      return (
        <div style={{ width:'100%', height:'100%', background:'#FDFBF8', padding: 28, fontFamily: M.fontSans, color: M.textPrimary, position:'relative' }}>
          <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom: 18 }}>
            <div>
              <div style={{ fontFamily: M.fontMono, fontSize: 10, letterSpacing: 1.4, textTransform:'uppercase', color: M.textTertiary, fontWeight: 500 }}>Murabbi · Extras Mobile</div>
              <h2 style={{ fontSize: 22, fontWeight: 500, letterSpacing: -0.4, margin: '6px 0 0' }}>33 mockups, 6 catégories</h2>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontFamily: M.fontMono, fontSize: 28, fontWeight: 500 }}>{total}</div>
              <div style={{ fontFamily: M.fontMono, fontSize: 10, letterSpacing: 0.6, color: M.textTertiary, textTransform:'uppercase' }}>artefacts</div>
            </div>
          </div>
          <div style={{ borderTop: `0.5px solid ${M.borderDefault}` }}>
            {rows.map((r, i) => (
              <div key={r.id} style={{ display:'grid', gridTemplateColumns:'24px 160px 160px 1fr', alignItems:'center', padding:'12px 0', borderBottom:`0.5px solid ${M.borderDefault}`, fontSize: 12 }}>
                <span style={{ fontFamily: M.fontMono, fontSize: 10, color: M.textTertiary, fontWeight: 500 }}>{r.id}</span>
                <span style={{ fontWeight: 500 }}>{r.name}</span>
                <span style={{ fontFamily: M.fontMono, color: M.accent, fontWeight: 500 }}>{r.n}</span>
                <span style={{ color: M.textSecondary }}>{r.list}</span>
              </div>
            ))}
          </div>
          <div style={{ position:'absolute', bottom: 24, left: 28, right: 28, fontSize: 11, color: M.textTertiary, fontFamily: M.fontMono, letterSpacing: 0.4 }}>
            Spec détaillée → <span style={{ color: M.textPrimary }}>Murabbi Extras Mobile - Spec.md</span>
          </div>
        </div>
      );
    }

    function PaletteSheet() {
      const swatches = [
        ['Sand · bg primary', M.bgPrimary],
        ['Sand · surface',    M.bgSurface],
        ['Accent · sienna',   M.accent],
        ['Success · sage',    M.success],
        ['Warning · ochre',   M.warning],
        ['Danger · brick',    M.danger],
        ['Text · primary',    M.textPrimary],
        ['Text · secondary',  M.textSecondary],
      ];
      return (
        <div style={{ width:'100%', height:'100%', background:'#FDFBF8', padding: 24, fontFamily: M.fontSans, color: M.textPrimary }}>
          <div style={{ fontFamily: M.fontMono, fontSize: 10, letterSpacing: 1.4, textTransform:'uppercase', color: M.textTertiary, fontWeight: 500, marginBottom: 14 }}>Tokens</div>
          <div style={{ display:'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {swatches.map(([name, val]) => (
              <div key={name} style={{ display:'flex', alignItems:'center', gap: 10, padding: '8px', borderRadius: 10, background: M.bgPrimary }}>
                <div style={{ width: 28, height: 28, borderRadius: 8, background: val, border: '0.5px solid rgba(28,26,22,0.10)' }}/>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 11, fontWeight: 500 }}>{name}</div>
                  <div style={{ fontFamily: M.fontMono, fontSize: 10, color: M.textTertiary }}>{val}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 18, paddingTop: 14, borderTop: `0.5px solid ${M.borderDefault}` }}>
            <div style={{ fontFamily: M.fontMono, fontSize: 10, letterSpacing: 1.4, textTransform:'uppercase', color: M.textTertiary, fontWeight: 500, marginBottom: 10 }}>Statut habitude</div>
            <div style={{ display:'flex', gap: 12, flexWrap:'wrap' }}>
              <StatusChip color={M.success} label="Validé"/>
              <StatusChip color={M.warning} label="En retard"/>
              <StatusChip color={M.danger} label="Manquée"/>
              <StatusChip color="rgba(28,26,22,0.10)" label="En attente" txtColor={M.textSecondary}/>
            </div>
          </div>
        </div>
      );
    }
    function StatusChip({ color, label, txtColor }) {
      return (
        <span style={{ display:'inline-flex', alignItems:'center', gap: 6, padding: '4px 8px', background: M.bgPrimary, borderRadius: 999, fontSize: 11, fontWeight: 500, color: txtColor || M.textPrimary }}>
          <span style={{ width: 8, height: 8, borderRadius: 999, background: color }}/>{label}
        </span>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
