<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Murabbi v1.5 — Sous-tâches · Objectif chiffré · Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { background: #efebe2; }
  video { pointer-events: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens-core.jsx"></script>
<script type="text/babel" src="v15-screens.jsx"></script>
<script type="text/babel" src="v15-execute.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas
      title="Murabbi v1.5 · Addendum"
      subtitle="Sous-tâches · Objectif chiffré · Timer in-app — itération sur wireframes Hi-Fi v3"
    >
      <DCSection id="modified" title="A · Écrans modifiés (mobile)">
        <DCArtboard id="hm01" label="HM-01 · Dashboard (objectif + timer + sous-tâches dans la liste)" width={390} height={844}><ScreenHM01v15/></DCArtboard>
        <DCArtboard id="hb01" label="HB-01 · Liste habitudes (mini-barre + badge timer)" width={390} height={844}><ScreenHB01v15/></DCArtboard>
        <DCArtboard id="hb02" label="HB-02 · Édition (3 nouvelles sections)" width={390} height={844}><ScreenHB02v15/></DCArtboard>
      </DCSection>

      <DCSection id="detail" title="B · HB-DETAIL · 3 variantes selon fonctionnalités">
        <DCArtboard id="hbd-objectif" label="HB-DETAIL · avec objectif chiffré" width={390} height={844}><ScreenHBDetailV15/></DCArtboard>
        <DCArtboard id="hbd-subtasks" label="HB-DETAIL · avec sous-tâches obligatoires" width={390} height={844}><ScreenHBDetailV15Subtasks/></DCArtboard>
        <DCArtboard id="hbd-timer" label="HB-DETAIL · avec timer (non démarré)" width={390} height={844}><ScreenHBDetailV15Timer/></DCArtboard>
      </DCSection>

      <DCSection id="execute-timer" title="C · HB-EXECUTE · Variante A — Timer">
        <DCArtboard id="exec-timer-init" label="A.1 · Timer initial · pas démarré" width={390} height={844}><HBExecuteTimerInitial/></DCArtboard>
        <DCArtboard id="exec-timer-run" label="A.2 · Timer en cours · 12:34 restant" width={390} height={844}><HBExecuteTimerRunning/></DCArtboard>
        <DCArtboard id="exec-timer-pause" label="A.3 · Timer en pause" width={390} height={844}><HBExecuteTimerPaused/></DCArtboard>
      </DCSection>

      <DCSection id="execute-counter" title="D · HB-EXECUTE · Variante B — Objectif chiffré">
        <DCArtboard id="exec-c-empty" label="B.1 · 0 / 5 · disabled" width={390} height={844}><HBExecuteCounter_Empty/></DCArtboard>
        <DCArtboard id="exec-c-partial" label="B.2 · 3 / 5 · partiel" width={390} height={844}><HBExecuteCounter_Partial/></DCArtboard>
        <DCArtboard id="exec-c-reached" label="B.3 · 5 / 5 · atteint · enabled" width={390} height={844}><HBExecuteCounter_Reached/></DCArtboard>
        <DCArtboard id="exec-c-exceed" label="B.4 · 7 / 5 · dépassé" width={390} height={844}><HBExecuteCounter_Exceeded/></DCArtboard>
      </DCSection>

      <DCSection id="execute-subtasks" title="E · HB-EXECUTE · Variante C — Sous-tâches">
        <DCArtboard id="exec-s-partial" label="C.1 · 3 / 5 cochées · disabled" width={390} height={844}><HBExecuteSubtasks_Partial/></DCArtboard>
        <DCArtboard id="exec-s-all" label="C.2 · 5 / 5 cochées · enabled" width={390} height={844}><HBExecuteSubtasks_All/></DCArtboard>
      </DCSection>

      <DCSection id="execute-combined" title="F · HB-EXECUTE · Variante D — Combiné">
        <DCArtboard id="exec-combined" label="D · Timer + objectif + sous-tâches empilés" width={390} height={844}><HBExecuteCombined/></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
