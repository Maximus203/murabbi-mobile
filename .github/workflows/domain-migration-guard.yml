name: Domain Migration Guard

# Garde-fou symétrique au cross-repo-guard côté admin
# (cf. murabbi-admin/docs/runbooks/cross-repo-coordination.md).
#
# Pourquoi : l'audit cross-spec 2026-05-09 a recensé 35 désalignements
# domain Dart ↔ schéma SQL admin. Cause racine : drift unidirectionnel
# mobile → admin non répliqué (cf. CLAUDE.md §16 leçons V1).
#
# Règle :
#   - Si la PR touche `lib/domain/entities/**`, `lib/domain/value_objects/**`,
#     `lib/data/datasources/supabase/**` ou `lib/data/mappers/**`, alors la
#     description PR doit contenir SOIT un header
#     `Migration-Ref: <url GitHub PR admin valide>`,
#     SOIT la phrase `no SQL impact` (dérogation explicite).
#   - Sinon le check échoue avec annotation explicite.
#
# Faux positifs connus (acceptés) :
#   - Refactor de value object dérivé sans changement persisté → `no SQL impact`.
#   - Renommage interne de fichier domain sans changement de signature → `no SQL impact`.

on:
  pull_request:
    branches: [develop, main]
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard-domain-migration:
    name: Domain ↔ migration admin companion check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect domain / data source changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_SHA" --depth=1 || true
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^lib/(domain/entities/|domain/value_objects/|data/datasources/supabase/|data/mappers/)' \
            || true)
          if [ -z "$CHANGED" ]; then
            echo "touches_domain=false" >> "$GITHUB_OUTPUT"
            echo "Aucun fichier domain/data persistance touché — guard non applicable."
          else
            echo "touches_domain=true" >> "$GITHUB_OUTPUT"
            echo "Fichiers domain / persistance touchés :"
            echo "$CHANGED"
          fi

      - name: Validate cross-repo coordination header
        if: steps.detect.outputs.touches_domain == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          BODY="${PR_BODY:-}"

          # Pattern 1 : Migration-Ref: <url GitHub PR admin>
          MIGRATION_REF_REGEX='[Mm]igration-?[Rr]ef[[:space:]]*:[[:space:]]*https://github\.com/[^/[:space:]]+/murabbi-admin/pull/[0-9]+'

          # Pattern 2 : no SQL impact (dérogation explicite)
          NO_IMPACT_REGEX='[Nn]o[[:space:]]+SQL[[:space:]]+impact'

          if echo "$BODY" | grep -Eq "$MIGRATION_REF_REGEX"; then
            MATCH=$(echo "$BODY" | grep -Eo "$MIGRATION_REF_REGEX" | head -n1)
            echo "::notice title=Cross-repo coordination::Migration admin compagnon référencée — $MATCH"
            exit 0
          fi

          if echo "$BODY" | grep -Eiq "$NO_IMPACT_REGEX"; then
            echo "::notice title=Cross-repo coordination::Dérogation 'no SQL impact' acceptée."
            exit 0
          fi

          echo "::error title=Cross-repo coordination manquante::Cette PR modifie le domain ou la couche persistance Supabase sans déclaration de coordination cross-repo."
          cat <<EOF
          ❌ Le garde-fou cross-repo exige l'un des deux éléments dans la description PR :

            1. Migration admin compagnon référencée (cas standard) :
                 Migration-Ref: https://github.com/Maximus203/murabbi-admin/pull/<numero>

            2. Dérogation explicite si le changement n'a aucun impact SQL :
                 no SQL impact — <courte justification>

          Référence : murabbi-admin/docs/runbooks/cross-repo-coordination.md
          Origine : audit cross-spec 2026-05-09 (35 désalignements détectés).
          Rappel : la PR admin doit être MERGÉE et DÉPLOYÉE en prod avant que la PR
          mobile soit mergée, sinon les mappers crashent au runtime.
          EOF
          exit 1
