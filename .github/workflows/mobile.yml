name: Mobile CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Coverage threshold (>= 80%)
        run: |
          # Bypass when coverage/lcov.info doesn't exist yet (Phase 0).
          if [ ! -f coverage/lcov.info ]; then
            echo "::warning::No coverage file — skipping threshold check"
            exit 0
          fi
          covered=$(awk -F: '/^LH:/ {sum+=$2} END {print sum+0}' coverage/lcov.info)
          total=$(awk -F: '/^LF:/ {sum+=$2} END {print sum+0}' coverage/lcov.info)
          if [ "$total" -eq 0 ]; then
            echo "::warning::No instrumented lines yet"
            exit 0
          fi
          pct=$(awk -v c="$covered" -v t="$total" 'BEGIN {printf "%.2f", (c/t)*100}')
          echo "Coverage: ${pct}% (${covered}/${total})"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 80) ? 0 : 1 }'

  build:
    name: Build APK (debug)
    runs-on: ubuntu-latest
    needs: analyze-test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug --no-pub
