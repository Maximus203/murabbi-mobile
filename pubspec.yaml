name: murabbi_mobile
description: "Murabbi — OS personnel de croissance humaine (Flutter + Supabase)"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Local notifications (timer v1.5 — Q-15a, spec v1.5 § 3.5/§ 7)
  flutter_local_notifications: ^17.2.3

  # Typography (Phase 1 — Geist + Geist Mono + Noto Sans Arabic, P-3)
  google_fonts: ^6.2.1

  # Iconographie (Phase 1 — Lucide, stroke 1.5px, cf. DS sheet)
  lucide_icons_flutter: ^3.1.13

  # Logging (règle §6 CLAUDE.md — interdit print() / dart:developer)
  logger: ^2.3.0

  # Date hijri (HM-01 §15 / issue #66)
  hijri: ^3.0.0

  # Utils
  equatable: ^2.0.7

  # Grapheme cluster iteration (used by BuildCollectionCoverUseCase to compute
  # the fallback cover initial — emoji + combining marks safe). Available
  # transitively via the Flutter SDK; declared explicitly so analyzer's
  # `depend_on_referenced_packages` is satisfied.
  characters: ^1.4.0
  shared_preferences: ^2.5.5

  # Calcul horaires de prière on-device (cf. ADR-013). Port MIT de adhan-js
  # (Batoul Apps). Import isolé dans
  # `lib/services/prayer/prayer_times_service.dart` — aucune autre couche
  # ne doit importer cette lib (règle ADR-013 §Architecture).
  adhan_dart: ^2.0.0

  # Geolocation pour le bouton "Utiliser ma position" de SA-02 (cf. ADR-014).
  # Import isolé dans `lib/services/location/` — aucune autre couche ne
  # doit importer cette lib directement (règle ADR-014 §Architecture).
  geolocator: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Integration testing (Phase 2 — E2E flows: onboarding-first, signup,
  # signIn). Pas de device requis pour `flutter analyze`/`flutter test`,
  # mais l'exécution effective des flows demande un device/émulateur.
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Tests
  mocktail: ^1.0.4

  # Fast-forward virtuel des Timer.periodic dans les tests
  # (cf. test/presentation/features/dashboard/providers/dashboard_ticker_provider_test.dart
  # — issue #47). Déjà transitif via test_api, déclaré explicite pour
  # satisfaire `depend_on_referenced_packages`.
  fake_async: ^1.3.1

  # Golden tests (Phase 1 — widgets atomiques)
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
