name: murabbi_mobile
description: "Murabbi — OS personnel de croissance humaine (Flutter + Supabase)"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Local notifications (timer v1.5 — Q-15a, spec v1.5 § 3.5/§ 7)
  flutter_local_notifications: ^17.2.3

  # Utils
  equatable: ^2.0.7

  # Grapheme cluster iteration (used by BuildCollectionCoverUseCase to compute
  # the fallback cover initial — emoji + combining marks safe). Available
  # transitively via the Flutter SDK; declared explicitly so analyzer's
  # `depend_on_referenced_packages` is satisfied.
  characters: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Riverpod codegen
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15

  # Tests
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
